<!DOCTYPE html>
<html>
<head>
    <title>SSTV Upload</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 1rem;
        background: #f6f8fa;
        color: #1f2328;
      }

      .page-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin: 0.75rem 0 1rem 0;
      }

      .nav-pill {
        display: inline-block;
        text-decoration: none;
        border-radius: 999px;
        padding: 0.65rem 1rem;
        font-size: 0.98rem;
        font-weight: bold;
        background: white;
        color: #0d6efd;
        border: 1px solid #0d6efd;
      }

      .nav-pill:hover {
        background: #eef4ff;
      }

      .nav-pill.active {
        background: #0d6efd;
        color: white;
      }
    </style>
</head>
<body>

<nav class="page-nav">
  <a href="{{ url_for('index') }}" class="nav-pill">← Logger</a>
  <a href="{{ url_for('sstv_upload') }}" class="nav-pill active">SSTV Images</a>
</nav>


<h2>SSTV Image Upload</h2>

<form method="POST" enctype="multipart/form-data">

    <label>Image:</label><br>
    <input type="file" name="image"><br><br>


 
    <label>Template:</label><br>
    <select name="template_type">
        <option value="cq">CQ</option>
        <option value="cq_pota">CQ POTA</option>
        <option value="reply">Reply</option>
        <option value="73">73</option>
        <option value="free">Free Form</option>
    </select><br><br>

    <label>Their Call (for reply):</label><br>

    <input type="text" name="their_call"><br><br>
    <label>RSV:</label><br>
    <input type="text" name="rsv" placeholder="595"><br><br>

    <label>Caption:</label><br>
    <input type="text" name="caption"><br><br>

    <label for="image_style">Image Style</label><br>
        <select id="image_style" name="image_style">
            <option value="original">Original Photo</option>
            <option value="cartoon">Cartoon / Watercolor SSTV</option>
        </select>

    <br><br>

    <button type="submit">Render</button>

</form>


</body>
</html>
